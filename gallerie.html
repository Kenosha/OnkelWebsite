<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Galerie mit handgemachten Portrait-Uhren und paradoxen Gebilden."
    />
    <title>Onkel's Kunsthandwerk – Galerie</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=2026_03_26_7" />
    <script defer src="assets/js/main.js?v=2026_03_26_1"></script>
    <script defer src="assets/js/gallerie.js?v=2026_02_05_3"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="Zur Startseite">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-text">Onkel's Kunsthandwerk</span>
        </a>
        <button
          class="nav-toggle"
          type="button"
          aria-label="Navigation öffnen"
          aria-expanded="false"
          aria-controls="site-nav"
          data-nav-toggle
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="nav" id="site-nav" aria-label="Hauptnavigation" data-nav>
          <a class="nav-link" href="index.html">Start</a>
          <a class="nav-link" href="gallerie.html">Galerie</a>
          <a class="nav-link" href="kontakt.html">Kontakt</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-head">
        <div class="container">
          <h1>Galerie</h1>
        </div>
      </section>

      <noscript>
        <section class="section">
          <div class="container">
            <p class="card">
              Für die Galerie wird JavaScript benötigt, damit die Kategorien und Bildansichten geladen
              werden können.
            </p>
          </div>
        </section>
      </noscript>

      <div data-gallery-root></div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p class="muted">© <span data-year></span> Onkel's Kunsthandwerk</p>
        <nav class="footer-nav" aria-label="Fußnavigation">
          <a class="nav-link" href="index.html">Start</a>
          <a class="nav-link" href="gallerie.html">Galerie</a>
          <a class="nav-link" href="kontakt.html">Kontakt</a>
          <a class="nav-link is-faint" href="impressum.html">Impressum</a>
          <a class="nav-link is-faint" href="datenschutz.html">Datenschutz</a>
        </nav>
      </div>
    </footer>
    <script>
      window.setTimeout(() => {
        const root = document.querySelector("[data-gallery-root]");
        if (!root) return;
        if (window.__onkelGalleryLoaded) return;
        root.innerHTML = `
          <section class="section">
            <div class="container">
              <div class="card">
                <h2>Galerie-Skript nicht geladen</h2>
                <p class="muted">
                  Bitte einmal hart neu laden (Strg+F5) oder den Browser-Cache leeren.
                </p>
              </div>
            </div>
          </section>
        `;
      }, 800);
    </script>
  </body>
</html>

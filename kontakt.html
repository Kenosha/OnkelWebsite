<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Kontakt – Anfrage, Bestellung oder Frage." />
    <title>Onkel's Kunsthandwerk – Kontakt</title>
    <link rel="stylesheet" href="assets/css/styles.css?v=2026_03_26_7" />
    <script defer src="assets/js/main.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html" aria-label="Zur Startseite">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-text">Onkel's Kunsthandwerk</span>
        </a>
        <nav class="nav" aria-label="Hauptnavigation">
          <a class="nav-link" href="index.html">Start</a>
          <a class="nav-link" href="gallerie.html">Galerie</a>
          <a class="nav-link" href="kontakt.html">Kontakt</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="page-head">
        <div class="container">
          <h1>Kontakt</h1>
	        </div>
	      </section>

      <section class="section section-contact">
        <div class="container">
          <article class="card card-opaque">
            <form
              id="kontaktForm"
              class="form"
              action="https://script.google.com/macros/s/AKfycbzUYhyRtAsWhXpVZufQHZrpM9x5Qy4UNW7GUbYiCDZJzgrGrNwfxeCY5z4UgbFHdH8u/exec"
              method="post"
            >
              <input
                type="text"
                name="hp"
                tabindex="-1"
                autocomplete="off"
                aria-hidden="true"
                style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden"
              />
              <label>
                Name
                <input
                  id="kontaktName"
                  type="text"
                  name="name"
                  placeholder="Dein Name"
                  autocomplete="name"
                  required
                />
              </label>
              <label>
                E‑Mail
                <input
                  id="kontaktEmail"
                  type="email"
                  name="email"
                  placeholder="du@beispiel.de"
                  autocomplete="email"
                  required
                />
              </label>
              <label>
                Telefon (optional)
                <input
                  id="kontaktTelefon"
                  type="tel"
                  name="telefon"
                  placeholder="+49 …"
                  autocomplete="tel"
                />
              </label>
              <label>
                Betreff (optional)
                <input
                  id="kontaktBetreff"
                  type="text"
                  name="betreff"
                  placeholder="Worum geht es?"
                />
              </label>
              <label>
                Nachricht / Wunsch
                <textarea
                  id="kontaktNachricht"
                  name="nachricht"
                  rows="5"
                  placeholder="Beschreibe kurz deine Anfrage oder deinen Wunsch."
                  required
                ></textarea>
              </label>
              <button class="btn" type="submit">Nachricht senden</button>
            </form>

            <div class="muted small" id="kontaktStatus" aria-live="polite" style="margin-top:10px"></div>
          </article>

          <p class="muted small" style="margin-top:14px">
            Oder möchtest du mir direkt eine E‑Mail schreiben? Dann hierhin:
            <a href="mailto:orlando@matteo-orlando.de">orlando@matteo-orlando.de</a>
          </p>
        </div>
      </section>
    </main>

	    <footer class="site-footer">
	      <div class="container footer-inner">
	        <p class="muted">© <span data-year></span> Onkel's Kunsthandwerk</p>
	        <nav class="footer-nav" aria-label="Fußnavigation">
	          <a class="nav-link" href="index.html">Start</a>
	          <a class="nav-link" href="gallerie.html">Galerie</a>
	          <a class="nav-link" href="kontakt.html">Kontakt</a>
	          <a class="nav-link is-faint" href="impressum.html">Impressum</a>
	          <a class="nav-link is-faint" href="datenschutz.html">Datenschutz</a>
	        </nav>
	      </div>
	    </footer>

	    <div class="toast" id="kontaktToast" role="status" aria-live="polite" aria-atomic="true">
	      <div class="toast-inner">
	        <div class="toast-text" id="kontaktToastText"></div>
	        <div class="toast-actions">
	          <a class="toast-link" href="mailto:orlando@matteo-orlando.de" id="kontaktToastMail"
	            >Oder per E‑Mail</a
	          >
	          <button class="btn" type="button" id="kontaktToastClose">OK</button>
	        </div>
	      </div>
	    </div>

	    <script>
	      const form = document.getElementById("kontaktForm");
	      const statusEl = document.getElementById("kontaktStatus");
	      const toast = document.getElementById("kontaktToast");
	      const toastText = document.getElementById("kontaktToastText");
	      const toastClose = document.getElementById("kontaktToastClose");

	      if (form) {
	        const showToast = (text) => {
	          if (toastText) toastText.textContent = text;
	          if (toast) toast.classList.add("is-visible");
	        };

	        const hideToast = () => {
	          if (toast) toast.classList.remove("is-visible");
	        };

	        if (toastClose) toastClose.addEventListener("click", hideToast);
	        if (toast) toast.addEventListener("click", (e) => {
	          if (e.target === toast) hideToast();
	        });

	        form.addEventListener("submit", async (e) => {
	          e.preventDefault();

	          const button = form.querySelector('button[type="submit"]');
	          if (button) {
	            button.disabled = true;
	            button.textContent = "Sende…";
	          }

	          if (statusEl) statusEl.textContent = "";

	          const endpoint = form.action;
	          const fd = new FormData(form);
	          const payload = new URLSearchParams();
	          for (const [key, value] of fd.entries()) payload.append(key, String(value));

	          try {
	            await fetch(endpoint, { method: "POST", body: payload, mode: "no-cors" });
	            form.reset();
	            showToast("Danke! Deine Nachricht wurde gesendet.");
	          } catch {
	            showToast("Netzwerkfehler. Bitte versuche es erneut oder schreibe per E‑Mail.");
	          } finally {
	            if (button) {
	              button.disabled = false;
	              button.textContent = "Nachricht senden";
	            }
	          }
	        });
	      }
	    </script>
	  </body>
	</html>
